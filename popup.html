<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; width: 320px; margin: 0; padding: 14px; color: #1a1a1a; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; margin: 0 0 12px; padding: 10px; }
    legend { font-size: 12px; color: #666; padding: 0 4px; }
    label { display: block; font-size: 13px; margin: 8px 0 4px; }
    input[type=text], input[type=number], select { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #bbb; border-radius: 6px; }
    .row { display: flex; align-items: center; gap: 8px; }
    .status { font-size: 13px; margin: 6px 0; }
    button { cursor: pointer; padding: 6px 10px; border: 1px solid #bbb; border-radius: 6px; background: #f5f5f5; }
    .saved { color: #2e7d32; font-size: 12px; min-height: 14px; }
  </style>
</head>
<body>
  <h1>StudyGuard</h1>

  <div class="status">Reveals remaining: <strong id="reveals">–</strong>
    <button id="resetReveals" type="button">Reset to 5</button>
  </div>

  <fieldset>
    <legend>Detection</legend>
    <label class="row"><input type="checkbox" id="enabled" /> Enabled</label>
    <label for="strictness">Mode</label>
    <select id="strictness">
      <option value="heuristics">Heuristics only (no API calls)</option>
      <option value="llm">Heuristics + LLM (uses proxy)</option>
    </select>
    <label for="proxyBase">Proxy base URL</label>
    <input type="text" id="proxyBase" placeholder="https://studyguard-proxy.vercel.app" />
    <label for="extToken">Extension token</label>
    <input type="text" id="extToken" placeholder="matches EXTENSION_TOKEN" />
  </fieldset>

  <fieldset>
    <legend>Teacher</legend>
    <label for="unlockCode">Unlock code</label>
    <input type="text" id="unlockCode" />
    <label for="refillAmount">Reveals granted per unlock</label>
    <input type="number" id="refillAmount" min="0" />
  </fieldset>

  <button id="save" type="button">Save</button>
  <div class="saved" id="savedMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
